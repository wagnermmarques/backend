<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JukeBoxd</title>
    <link rel="stylesheet" href="css/senha.css">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <header class="container">
    <h1>JukeBoxd</h1>
    <nav class="direita">
        <a href="#">entre</a>
        <a href="#">criar conta</a>
        <a href="#">músicas</a>
        <a href="#">álbuns</a>
        <a href="#">gêneros</a>
    </nav>
</header>

<div class="textos">
    <h2>Configurações da Conta</h2>
</div>
    
    <nav class="navegaçao">
        <ul>
            <li><a href="#">PERFIL</a></li>
            <li class="active"><a href="senha.html">SENHA</a></li>
            <li><a href="avatar.html">AVATAR</a></li>
            <li><a href="#">CONEXÕES</a></li>
            <li><a href="#">NOTIFICAÇÕES</a></li>
        </ul>
    </nav>

        <div class="editar">
            <h2>Mudar Senha</h2>
            <form id="password-form">
                <input name="currentPassword" type="password" placeholder="Senha atual" minlength="6" required autocomplete="current-password">
                <input name="password" type="password" placeholder="Nova senha" minlength="6" required autocomplete="new-password">
                <input name="confirmPassword" type="password" placeholder="Confirme a nova senha" minlength="6" required autocomplete="new-password">
                <button type="submit" class="submit-button">Salvar</button>
            </form>    
        </div>
  
<footer class="rodape">
    <div class="esquerdo">
        <div class="links">
            <a href="#">sobre</a>
            <a href="#">contato</a>
            <a href="#">acervo</a>
            <a href="#">termos</a>
        </div>
        <div class="conteúdo">
            <p>&copy; 2026 JukeBoxd. Todos os direitos reservados.</p>
        </div>
    </div>

    <div class="redes">
        <div class="item">
            <img src="img/instagram.png" alt="Insta"> <span>@jukeboxd</span>
        </div>
        <div class="item">
            <img src="img/facebook.png" alt="FB"> <span>/jukeboxd</span>
        </div>
        <div class="item">
            <img src="img/email.png" alt="Email"> <span>contato@jukeboxd.com</span>
        </div>
    </div>
</footer>
<script src="js/app.js" defer></script>

</body>
</html>
